<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laser Incident Analysis Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    #chart {
      width: 100%;
      height: 600px;
    }
  </style>
</head>
<body>
  <div class="container mt-4">
    <h1 class="text-center">Laser Incident Analysis Dashboard</h1>
    <div class="row mt-4">
      <div class="col-md-4">
        <select id="visualization-dropdown" class="form-select">
          <option value="top_colors">Top 5 Laser Colors</option>
          <option value="state_bar">Incidents by State</option>
          <option value="time_bar">Incidents Over Time</option>
          <option value="altitude_time">Altitude vs. Time</option>
        </select>
      </div>
    </div>
    <div class="row mt-4">
      <div class="col-md-12">
        <div id="chart"></div>
      </div>
    </div>
  </div>

  <script>
    // Load data from JSON
    let data;

    // Parse the "Incident Time" column
    function parseIncidentTime(timeValue) {
      try {
        const timeStr = String(timeValue).trim().padStart(4, "0");
        const hours = parseInt(timeStr.slice(0, -2));
        const minutes = parseInt(timeStr.slice(-2));
        if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return null;
        return hours + minutes / 60;
      } catch (e) {
        console.error(`Error parsing time '${timeValue}':`, e);
        return null;
      }
    }

    // Load and process data
    async function loadData() {
      const response = await fetch("combined_output.json");
      data = await response.json();

      // Parse "Incident Time" and clean data
      data.forEach((d) => {
        d["Incident Time"] = parseIncidentTime(d["Incident Time"]);
        d["Altitude"] = +d["Altitude"];
        d["State"] = d["State"].trim();
        d["Laser Color"] = d["Laser Color"].trim();
      });

      // Remove rows with invalid data
      data = data.filter((d) => d["Incident Time"] !== null && !isNaN(d["Altitude"]));

      console.log("Data loaded and processed:", data);
    }

    // Visualization 1: Top 5 Laser Colors
    function plotTopLaserColors() {
      const colorCounts = d3.rollup(
        data,
        (v) => v.length,
        (d) => d["Laser Color"]
      );
      const topColors = Array.from(colorCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5)
        .map(([color, count]) => ({ color, count }));

      const trace = {
        x: topColors.map((d) => d.color),
        y: topColors.map((d) => d.count),
        type: "bar",
        marker: { color: topColors.map((d) => laserColorMap[d.color]) },
      };

      const layout = {
        title: "Top 5 Most Common Laser Colors",
        xaxis: { title: "Laser Color" },
        yaxis: { title: "Number of Incidents" },
      };

      Plotly.newPlot("chart", [trace], layout);
    }

    // Visualization 2: Incidents by State (Bar Chart)
    function plotIncidentsByState() {
      const stateCounts = d3.rollup(
        data,
        (v) => v.length,
        (d) => d["State"]
      );

      const stateData = Array.from(stateCounts)
        .sort((a, b) => b[1] - a[1])
        .map(([state, count]) => ({ state, count }));

      const trace = {
        x: stateData.map((d) => d.state),
        y: stateData.map((d) => d.count),
        type: "bar",
      };

      const layout = {
        title: "Laser Incidents by State",
        xaxis: { title: "State" },
        yaxis: { title: "Number of Incidents" },
      };

      Plotly.newPlot("chart", [trace], layout);
    }

    // Visualization 3: Incidents Over Time (Bar Chart)
    function plotIncidentsOverTime() {
      const hourCounts = d3.rollup(
        data,
        (v) => v.length,
        (d) => Math.floor(d["Incident Time"])
      );

      const timeData = Array.from(hourCounts)
        .sort((a, b) => a[0] - b[0])
        .map(([hour, count]) => ({ hour, count }));

      const trace = {
        x: timeData.map((d) => d.hour),
        y: timeData.map((d) => d.count),
        type: "bar",
      };

      const layout = {
        title: "Laser Incidents by Hour of the Day",
        xaxis: { title: "Hour of the Day" },
        yaxis: { title: "Number of Incidents" },
      };

      Plotly.newPlot("chart", [trace], layout);
    }

    // Visualization 4: Altitude vs. Time (Scatter Plot)
    function plotAltitudeVsTime() {
      const trace = {
        x: data.map((d) => d["Altitude"]),
        y: data.map((d) => d["Incident Time"]),
        mode: "markers",
        marker: {
          color: data.map((d) => laserColorMap[d["Laser Color"]]),
          size: 8,
        },
        text: data.map(
          (d) => `City: ${d["City"]}<br>State: ${d["State"]}<br>Flight ID: ${d["Flight ID"]}`
        ),
        type: "scatter",
      };

      const layout = {
        title: "Altitude vs. Incident Time",
        xaxis: { title: "Altitude (ft)" },
        yaxis: { title: "Incident Time (hours)" },
      };

      Plotly.newPlot("chart", [trace], layout);
    }

    // Color mapping for laser colors
    const laserColorMap = {
      Green: "green",
      Red: "red",
      Blue: "blue",
      Yellow: "yellow",
      White: "white",
      Purple: "purple",
      Orange: "orange",
    };

    // Handle dropdown change
    document.getElementById("visualization-dropdown").addEventListener("change", (event) => {
      const selectedVisualization = event.target.value;
      switch (selectedVisualization) {
        case "top_colors":
          plotTopLaserColors();
          break;
        case "state_bar":
          plotIncidentsByState();
          break;
        case "time_bar":
          plotIncidentsOverTime();
          break;
        case "altitude_time":
          plotAltitudeVsTime();
          break;
        default:
          Plotly.purge("chart");
      }
    });

    // Initialize
    loadData().then(() => {
      plotTopLaserColors(); // Default visualization
    });
  </script>
</body>
</html>
