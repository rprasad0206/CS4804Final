<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Injury Analysis Map</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .tabs {
            display: flex;
            background-color: #333;
            padding: 10px;
        }

        .tab {
            color: white;
            padding: 10px 20px;
            cursor: pointer;
        }

        .tab:hover {
            background-color: #575757;
        }

        .active {
            background-color: #4CAF50;
        }

        .tab-content {
            display: none;
            padding: 20px;
        }

        .active-tab-content {
            display: block;
        }

        #filters {
            margin: 20px 0;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        #filters label {
            margin-right: 5px;
            font-weight: bold;
        }

        #filters select, #filters input {
            padding: 5px;
            font-size: 14px;
        }

        #injury-analysis-map {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
        }

        #tooltip {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px;
            display: none;
            pointer-events: none;
        }

        #state-info-container {
            padding: 20px;
            border: 1px solid #ccc;
            margin-top: 20px;
            display: none;
            background: #f9f9f9;
        }

        #reset-zoom {
            margin-top: 10px;
            padding: 8px;
            font-size: 14px;
            cursor: pointer;
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
        }

        #reset-zoom:hover {
            background-color: #cc0000;
        }
    </style>
</head>

<body>
    <!-- Tab navigation -->
    <div class="tabs">
        <div class="tab active" id="tiltedMapTab">3D Tilted US Map</div>
        <div class="tab" id="injuryAnalysisTab">Injury Analysis</div>
    </div>

    <!-- Tab content -->
    <div id="tiltedMapContent" class="tab-content active-tab-content">
        <h2>3D Tilted US Map</h2>
        <svg id="map"></svg>
        <div id="tooltip"></div>
    </div>

    <div id="injuryAnalysisContent" class="tab-content">
        <h2>Injury Analysis</h2>

        <!-- Filters for Injury Analysis -->
        <div id="filters">
            <label for="laser-color-filter">Laser Color:</label>
            <select id="laser-color-filter">
                <option value="All">All</option>
            </select>

            <label for="aircraft-filter">Aircraft:</label>
            <select id="aircraft-filter">
                <option value="All">All</option>
            </select>

            <label for="state-filter">State:</label>
            <select id="state-filter">
                <option value="All">All</option>
            </select>

            <label for="date-range">Year:</label>
            <input type="range" id="date-range" min="2016" max="2024" value="2024">
            <span id="date-range-value">2024</span>
        </div>

        <!-- SVG for Injury Map -->
        <svg id="injury-analysis-map"></svg>
        <div id="tooltip"></div>

        <!-- State Information Container -->
        <div id="state-info-container"></div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Include the JS files for both maps -->
    <script src="tiltedMap.js"></script>
    <script src="injuryAnalysis.js"></script>

    <script>
        // Switch between tabs
        const tiltedMapTab = document.getElementById("tiltedMapTab");
        const injuryAnalysisTab = document.getElementById("injuryAnalysisTab");
        const tiltedMapContent = document.getElementById("tiltedMapContent");
        const injuryAnalysisContent = document.getElementById("injuryAnalysisContent");
        const dateRangeSlider = document.getElementById("date-range");
        const dateRangeValue = document.getElementById("date-range-value");

        tiltedMapTab.addEventListener("click", () => {
            tiltedMapTab.classList.add("active");
            injuryAnalysisTab.classList.remove("active");

            tiltedMapContent.classList.add("active-tab-content");
            injuryAnalysisContent.classList.remove("active-tab-content");
        });

        injuryAnalysisTab.addEventListener("click", () => {
            injuryAnalysisTab.classList.add("active");
            tiltedMapTab.classList.remove("active");

            injuryAnalysisContent.classList.add("active-tab-content");
            tiltedMapContent.classList.remove("active-tab-content");
        });

        // Update date range value
        dateRangeSlider.addEventListener("input", () => {
            dateRangeValue.textContent = dateRangeSlider.value;
        });

        // Load data for injury analysis map (example data)
        d3.json("top_laser_colors.json").then(data => {
            initInjuryMap(data);
        });
    </script>
</body>

</html>
